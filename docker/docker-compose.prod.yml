# PROD override — runs TOGETHER with the base at root (base must be the first -f):
#   docker compose -f docker-compose.yml -f docker/docker-compose.prod.yml up --build -d
# Relative paths are resolved from the first -f file's dir (= project root) -> use "." and "docker/".
services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    container_name: booking-app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      REDIS_HOST: redis
    ports:
      - '${PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
