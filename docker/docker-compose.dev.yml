# DEV override — runs TOGETHER with the base at root (base must be the first -f):
#   docker compose -f docker-compose.yml -f docker/docker-compose.dev.yml up --build
# Relative paths are resolved from the first -f file's dir (= project root) -> use "." and "docker/".
services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: booking-app-dev
    env_file: .env
    environment:
      # Inside the compose network, the DB/Redis host is the SERVICE NAME, not localhost
      NODE_ENV: development
      DB_HOST: postgres
      REDIS_HOST: redis
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      - .:/app
      - /app/node_modules # keep node_modules inside the container, not overridden by the host
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run start:dev
